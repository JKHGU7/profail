<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>やまぐちのスイートページ</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Maru Gothic ProN", sans-serif;
      background: linear-gradient(to bottom, #fff5f7, #ffe4e1);
      color: #5a3e36;
    }

    header {
      background-color: #ffb6c1;
      padding: 30px;
      text-align: center;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .container {
      padding: 30px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h2 {
      border-bottom: 2px dashed #ffb6c1;
      padding-bottom: 5px;
    }

    .icon {
      font-size: 1.5em;
      margin-right: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #ffb6c1;
      color: white;
      margin-top: 40px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background: #ff8fab;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      margin-top: 10px;
    }

    .button:hover {
      background: #ff6f91;
    }
  </style>
</head>
<body>

  <header>
    <h1>🍰 やまぐちのスイートページ 🍰</h1>
    <p>ようこそ！甘いものが好きな人もぜひどうぞ♪</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>🍪 自己紹介</h2>
      <p>こんにちは、やまぐちです！</p>
      <p>のんびりしたことや、おいしいものが大好きです。</p>
    </div>

    <div class="card">
      <h2>🧁 好きなもの</h2>
      <ul>
        <li>ケーキ</li>
        <li>クッキー</li>
        <li>チョコレート</li>
        <li>カフェ巡り</li>
      </ul>
    </div>

    <div class="card">
      <h2>🍩 趣味</h2>
      <p>お菓子を食べることはもちろん、写真を撮ったり、ゆっくり過ごすのが好きです。</p>
    </div>

    <div class="card">
      <h2>🍫 メッセージ</h2>
      <p>ここまで見てくれてありがとうございます！</p>
      <p>気軽に仲良くしてください♪</p>
      <a href="#" class="button">お問い合わせ</a>
    </div>

  </div>

  <footer>
    <p>© やまぐちのスイートワールド</p>
  </footer>

</body>
</html>
